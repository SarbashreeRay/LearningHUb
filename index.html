<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextGenData & MLOps – Data Engineering, ML Engineering & MLOps Knowledge Base</title>
  <meta name="description" content="Production-grade notes, architectures, and real-world code examples for modern Data Engineering, ML Engineering & MLOps. 40+ topics with 100+ code examples." />
  <meta property="og:title" content="NextGenData & MLOps – Knowledge Base" />
  <meta property="og:description" content="Production-grade notes and real-world code for Data Engineering, ML Engineering & MLOps." />
  <meta name="keywords" content="Data Engineering, MLOps, Apache Spark, Kafka, Airflow, dbt, Machine Learning, Docker, Kubernetes, Python" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>⚡</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Mobile Toggle Button -->
  <button class="mobile-toggle" id="mobile-toggle-btn" onclick="toggleMobileSidebar()" aria-label="Toggle sidebar">
    ☰
  </button>

  <!-- Sidebar Backdrop (mobile) -->
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <!-- App Layout -->
  <div class="app-layout">

    <!-- ─── Sidebar ─── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="site-brand" onclick="navigateTo('home')">
          <div class="site-logo">N</div>
          <div>
            <div class="site-title">NextGenData & MLOps</div>
            <div class="site-subtitle">Knowledge Base</div>
          </div>
        </div>
      </div>

      <div class="sidebar-search">
        <button class="search-trigger" onclick="openSearch()" id="search-trigger-btn">
          <span class="search-icon">🔍</span>
          <span>Search notes...</span>
          <span class="search-shortcut">Ctrl+K</span>
        </button>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Generated by JS -->
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-footer-content">
          <span class="footer-dot"></span>
          <span>50+ Topics · 110+ Examples</span>
        </div>
      </div>
    </aside>

    <!-- ─── Main Content ─── -->
    <main class="main-content">
      <div class="breadcrumb-bar" id="breadcrumb">
        <span class="breadcrumb-current">🏠 Home</span>
      </div>

      <div class="content-area" id="page-content">
        <!-- Rendered by JS -->
        <div style="display:flex;align-items:center;justify-content:center;height:60vh;color:var(--text-tertiary);">
          Loading...
        </div>
      </div>
    </main>
  </div>

  <!-- ─── Search Modal ─── -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-modal">
      <div class="search-input-wrapper">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          class="search-input"
          id="search-input"
          placeholder="Search topics, tools, concepts..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="search-close" onclick="closeSearch()">ESC</button>
      </div>
      <div class="search-results" id="search-results">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });
  </script>
  <script src="content.js?v=20260721"></script>
  <script src="app.js?v=20260721"></script>
</body>
</html>
